{% extends "base.html" %}
{% block title %}{{ t.about_title }} — {{ profile.name|localized(lang) }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container narrow">
    <h1 class="page-title">{{ t.about_title }}</h1>
    <div class="about-grid">
      <div class="about-photo">
        <img src="{{ url_for('static', filename=profile.photo) }}" alt="{{ profile.name|localized(lang) }}"
             onerror="this.classList.add('photo-fallback');this.removeAttribute('src');">
      </div>
      <div class="about-text">
        {% for para in profile.bio|localized(lang) %}
        <p>{{ para }}</p>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
